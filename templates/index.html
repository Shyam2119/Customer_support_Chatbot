<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Chat</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        /* ── THEME VARIABLES ─────────────────────────────── */
        :root, [data-theme="dark"] {
            --bg:           #0d1117;
            --bg2:          #161b22;
            --bg3:          #21262d;
            --card:         rgba(22,27,34,0.95);
            --border:       #30363d;
            --accent:       #58a6ff;
            --accent2:      #bc8cff;
            --accent3:      #3fb950;
            --user-bubble:  linear-gradient(135deg, #1f6feb, #388bfd);
            --bot-bubble:   #21262d;
            --text:         #e6edf3;
            --text2:        #8b949e;
            --text3:        #6e7681;
            --header-bg:    linear-gradient(135deg, #1f6feb 0%, #1a56c4 100%);
            --shadow:       0 8px 32px rgba(0,0,0,0.5);
            --input-bg:     #0d1117;
            --send-btn:     linear-gradient(135deg,#1f6feb,#388bfd);
            --quick-border: #30363d;
            --quick-hover:  rgba(88,166,255,0.12);
            --modal-bg:     #161b22;
        }
        [data-theme="light"] {
            --bg:           #f0f2f5;
            --bg2:          #ffffff;
            --bg3:          #f8f9fb;
            --card:         #ffffff;
            --border:       #e1e4e8;
            --accent:       #0969da;
            --accent2:      #8250df;
            --accent3:      #1a7f37;
            --user-bubble:  linear-gradient(135deg,#0969da,#1f6feb);
            --bot-bubble:   #f6f8fa;
            --text:         #1f2328;
            --text2:        #57606a;
            --text3:        #8c959f;
            --header-bg:    linear-gradient(135deg,#0969da 0%,#1158c7 100%);
            --shadow:       0 4px 24px rgba(0,0,0,0.12);
            --input-bg:     #ffffff;
            --send-btn:     linear-gradient(135deg,#0969da,#1f6feb);
            --quick-border: #d0d7de;
            --quick-hover:  rgba(9,105,218,0.08);
            --modal-bg:     #ffffff;
        }
        [data-theme="purple"] {
            --bg:           #0f0a1e;
            --bg2:          #1a1130;
            --bg3:          #231742;
            --card:         rgba(26,17,48,0.96);
            --border:       #3d2b6b;
            --accent:       #c084fc;
            --accent2:      #e879f9;
            --accent3:      #4ade80;
            --user-bubble:  linear-gradient(135deg,#7c3aed,#a855f7);
            --bot-bubble:   #231742;
            --text:         #f0e6ff;
            --text2:        #a78bfa;
            --text3:        #7c6fa8;
            --header-bg:    linear-gradient(135deg,#7c3aed 0%,#6d28d9 100%);
            --shadow:       0 8px 32px rgba(124,58,237,0.3);
            --input-bg:     #0f0a1e;
            --send-btn:     linear-gradient(135deg,#7c3aed,#a855f7);
            --quick-border: #3d2b6b;
            --quick-hover:  rgba(192,132,252,0.1);
            --modal-bg:     #1a1130;
        }
        [data-theme="ocean"] {
            --bg:           #0a1628;
            --bg2:          #0d2240;
            --bg3:          #112d52;
            --card:         rgba(13,34,64,0.96);
            --border:       #1e4080;
            --accent:       #38bdf8;
            --accent2:      #22d3ee;
            --accent3:      #34d399;
            --user-bubble:  linear-gradient(135deg,#0284c7,#0ea5e9);
            --bot-bubble:   #112d52;
            --text:         #e0f2fe;
            --text2:        #7dd3fc;
            --text3:        #4d90b8;
            --header-bg:    linear-gradient(135deg,#0284c7 0%,#0369a1 100%);
            --shadow:       0 8px 32px rgba(2,132,199,0.25);
            --input-bg:     #0a1628;
            --send-btn:     linear-gradient(135deg,#0284c7,#0ea5e9);
            --quick-border: #1e4080;
            --quick-hover:  rgba(56,189,248,0.1);
            --modal-bg:     #0d2240;
        }

        /* ── RESET & BASE ────────────────────────────────── */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { font-size:15px; }
        body {
            font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
            background: var(--bg);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            transition: background 0.3s ease, color 0.3s ease;
        }

        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

        /* ── CHAT WRAPPER ────────────────────────────────── */
        .chat-wrap {
            width:100%; max-width:880px;
            height:96vh;
            background: var(--card);
            border-radius:20px;
            box-shadow: var(--shadow);
            display:flex; flex-direction:column;
            overflow:hidden;
            border:1px solid var(--border);
            transition: all 0.3s ease;
        }

        /* ── HEADER ──────────────────────────────────────── */
        .header {
            background: var(--header-bg);
            color:#fff; padding:16px 20px;
            display:flex; align-items:center; gap:12px;
            flex-shrink:0;
        }
        .bot-avatar {
            width:44px; height:44px;
            background:rgba(255,255,255,0.2);
            border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:20px; flex-shrink:0;
        }
        .header-info h2 { font-size:1rem; font-weight:700; }
        .header-info p  { font-size:0.72rem; opacity:0.85; margin-top:1px; display:flex; align-items:center; gap:5px; }
        .online-dot {
            width:7px; height:7px; background:#4ade80;
            border-radius:50%; display:inline-block;
            animation: pulse-g 2s infinite;
        }
        @keyframes pulse-g { 0%,100%{opacity:1}50%{opacity:0.5} }

        .header-actions { margin-left:auto; display:flex; align-items:center; gap:6px; }
        .hbtn {
            background:rgba(255,255,255,0.15);
            border:1px solid rgba(255,255,255,0.2);
            color:#fff; padding:6px 12px;
            border-radius:8px; cursor:pointer;
            font-size:0.75rem; font-weight:500;
            transition:background 0.2s;
            text-decoration:none; display:inline-block;
            font-family:inherit;
        }
        .hbtn:hover { background:rgba(255,255,255,0.28); }

        /* Theme picker */
        .theme-picker {
            position:relative; display:inline-block;
        }
        .theme-menu {
            display:none;
            position:absolute; top:calc(100% + 6px); right:0;
            background:var(--modal-bg);
            border:1px solid var(--border);
            border-radius:10px;
            padding:6px;
            z-index:999;
            min-width:140px;
            box-shadow: var(--shadow);
        }
        .theme-picker.open .theme-menu { display:block; }
        .theme-opt {
            display:flex; align-items:center; gap:8px;
            padding:7px 10px;
            border-radius:7px;
            cursor:pointer;
            font-size:0.78rem;
            color:var(--text2);
            transition:background 0.15s;
        }
        .theme-opt:hover { background:var(--quick-hover); color:var(--accent); }
        .theme-opt.active { color:var(--accent); font-weight:600; }
        .theme-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

        /* ── SESSION BAR ─────────────────────────────────── */
        .session-bar {
            padding:5px 20px;
            background:var(--bg3);
            border-bottom:1px solid var(--border);
            font-size:0.7rem; color:var(--text3);
            display:flex; align-items:center; gap:10px;
        }
        .session-bar code { font-family:monospace; color:var(--text2); }

        /* ── INTENT BAR ──────────────────────────────────── */
        .intent-bar {
            padding:6px 20px;
            background:var(--bg2);
            border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:8px;
            font-size:0.72rem; color:var(--text3); flex-shrink:0;
        }
        .intent-badge {
            background:rgba(88,166,255,0.15);
            color:var(--accent);
            border:1px solid rgba(88,166,255,0.25);
            padding:2px 9px; border-radius:12px;
            font-size:0.68rem; font-weight:600;
        }
        .conf-wrap { margin-left:auto; display:flex; align-items:center; gap:6px; }
        .conf-bar { width:72px; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
        .conf-fill {
            height:100%;
            background:linear-gradient(90deg,var(--accent),var(--accent2));
            border-radius:3px; transition:width 0.5s ease;
        }

        /* ── MESSAGES ────────────────────────────────────── */
        .messages {
            flex:1; overflow-y:auto;
            padding:20px 18px; display:flex;
            flex-direction:column; gap:14px;
        }
        .msg-row {
            display:flex; align-items:flex-end; gap:9px;
            animation: fadeUp 0.28s ease;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
        .msg-row.user { flex-direction:row-reverse; }

        .av {
            width:30px; height:30px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:14px; flex-shrink:0;
        }
        .av.bot  { background:linear-gradient(135deg,var(--accent),var(--accent2)); }
        .av.user { background:linear-gradient(135deg,var(--accent3),var(--accent)); }

        .msg-group { max-width:74%; display:flex; flex-direction:column; gap:3px; }
        .msg-row.user .msg-group { align-items:flex-end; }

        .bubble {
            padding:10px 14px; border-radius:16px;
            font-size:0.875rem; line-height:1.55;
            word-break:break-word;
        }
        .bubble.bot {
            background:var(--bot-bubble);
            border:1px solid var(--border);
            color:var(--text);
            border-bottom-left-radius:4px;
        }
        .bubble.user {
            background:var(--user-bubble);
            color:#fff;
            border-bottom-right-radius:4px;
        }

        .msg-meta {
            display:flex; align-items:center; gap:5px;
            font-size:0.66rem; color:var(--text3); padding:0 3px;
        }
        .sent-tag {
            padding:1px 6px; border-radius:10px;
            font-size:0.63rem; font-weight:600;
        }
        .sent-tag.positive { background:rgba(63,185,80,0.15); color:#3fb950; }
        .sent-tag.negative { background:rgba(248,81,73,0.18); color:#f85149; }
        .sent-tag.neutral  { background:rgba(139,148,158,0.15); color:var(--text2); }

        .entity-pills { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
        .epill {
            background:rgba(188,140,255,0.12);
            color:var(--accent2);
            border:1px solid rgba(188,140,255,0.2);
            padding:1px 7px; border-radius:10px;
            font-size:0.63rem; font-weight:500;
        }

        /* Feedback row */
        .fb-row { display:flex; gap:5px; margin-top:4px; }
        .fb-btn {
            background:transparent;
            border:1px solid var(--border);
            color:var(--text3);
            padding:3px 9px; border-radius:8px;
            font-size:0.72rem; cursor:pointer;
            transition:all 0.15s; font-family:inherit;
        }
        .fb-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--quick-hover); }
        .fb-btn.good { background:rgba(63,185,80,0.12); color:#3fb950; border-color:#3fb950; }
        .fb-btn.bad  { background:rgba(248,81,73,0.12); color:#f85149; border-color:#f85149; }

        /* Typing */
        .typing-row { display:none; align-items:flex-end; gap:9px; }
        .typing-row.show { display:flex; }
        .typing-dots {
            background:var(--bot-bubble);
            border:1px solid var(--border);
            border-radius:16px; border-bottom-left-radius:4px;
            padding:11px 16px; display:flex; gap:4px;
        }
        .tdot {
            width:6px; height:6px; background:var(--text3);
            border-radius:50%; animation:bounce 1.2s infinite;
        }
        .tdot:nth-child(2){animation-delay:.2s} .tdot:nth-child(3){animation-delay:.4s}
        @keyframes bounce{0%,60%,100%{transform:none}30%{transform:translateY(-5px)}}

        .sys-msg {
            text-align:center; font-size:0.7rem; color:var(--text3);
            background:rgba(110,118,129,0.12); border-radius:20px;
            padding:3px 12px; width:fit-content; margin:0 auto;
        }

        /* ── QUICK REPLIES ───────────────────────────────── */
        .quick-replies {
            padding:8px 18px 0;
            display:flex; flex-wrap:wrap; gap:7px;
        }
        .qbtn {
            background:transparent;
            border:1px solid var(--quick-border);
            color:var(--text2); padding:6px 13px;
            border-radius:20px; font-size:0.78rem;
            cursor:pointer; transition:all 0.18s;
            font-family:inherit;
        }
        .qbtn:hover { border-color:var(--accent); color:var(--accent); background:var(--quick-hover); }

        /* ── INPUT ───────────────────────────────────────── */
        .input-area {
            padding:12px 18px 16px;
            border-top:1px solid var(--border);
            background:var(--bg2); flex-shrink:0;
        }
        .input-row { display:flex; gap:9px; align-items:flex-end; }
        .msg-input {
            flex:1;
            background:var(--input-bg);
            border:1px solid var(--border);
            border-radius:13px;
            color:var(--text); font-family:inherit;
            font-size:0.875rem; padding:10px 13px;
            resize:none; outline:none;
            min-height:42px; max-height:110px;
            transition:border-color 0.2s;
        }
        .msg-input::placeholder { color:var(--text3); }
        .msg-input:focus { border-color:var(--accent); }
        .send-btn {
            width:42px; height:42px;
            background:var(--send-btn);
            border:none; border-radius:13px;
            color:#fff; font-size:17px;
            cursor:pointer; display:flex;
            align-items:center; justify-content:center;
            flex-shrink:0; transition:all 0.18s;
        }
        .send-btn:hover { transform:scale(1.06); box-shadow:0 4px 16px rgba(31,111,235,0.4); }
        .send-btn:active { transform:scale(0.96); }
        .send-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; }

        /* ── RATING MODAL ────────────────────────────────── */
        .modal-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.55); z-index:200;
            align-items:center; justify-content:center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display:flex; }
        .modal {
            background:var(--modal-bg);
            border:1px solid var(--border);
            border-radius:18px; padding:28px 32px;
            width:340px; text-align:center;
            box-shadow:var(--shadow);
            animation: popIn 0.25s ease;
        }
        @keyframes popIn { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:none} }
        .modal h3 { font-size:1.05rem; color:var(--text); margin-bottom:5px; }
        .modal p  { font-size:0.82rem; color:var(--text2); margin-bottom:14px; }
        .stars { display:flex; justify-content:center; gap:8px; margin:12px 0; }
        .star {
            font-size:1.9rem; cursor:pointer;
            transition:transform 0.14s;
            filter:grayscale(1); opacity:0.5;
        }
        .star:hover, .star.sel { filter:none; opacity:1; transform:scale(1.15); }
        .rating-txt { font-size:0.8rem; color:var(--text2); height:18px; margin-bottom:8px; }
        .modal-textarea {
            width:100%; padding:9px 11px;
            background:var(--input-bg);
            border:1px solid var(--border); border-radius:10px;
            font-size:0.83rem; resize:none; height:65px;
            font-family:inherit; outline:none; color:var(--text);
            transition:border-color 0.2s; margin-bottom:14px;
        }
        .modal-textarea:focus { border-color:var(--accent); }
        .modal-textarea::placeholder { color:var(--text3); }
        .modal-acts { display:flex; gap:9px; justify-content:center; }
        .mbtn {
            padding:8px 20px; border-radius:9px;
            border:none; cursor:pointer;
            font-size:0.83rem; font-weight:600;
            transition:all 0.18s; font-family:inherit;
        }
        .mbtn-primary { background:var(--send-btn); color:#fff; }
        .mbtn-primary:hover { opacity:0.88; }
        .mbtn-ghost {
            background:transparent;
            border:1px solid var(--border);
            color:var(--text2);
        }
        .mbtn-ghost:hover { background:var(--quick-hover); }

        @media(max-width:600px){
            .chat-wrap{height:100vh;border-radius:0;}
            .bubble{max-width:92%;}
            .header-actions .hbtn:not(.keep){display:none;}
        }
    </style>
</head>
<body>
<div class="chat-wrap">

    <!-- Header -->
    <div class="header">
        <div class="bot-avatar">✨</div>
        <div class="header-info">
            <h2>Skyfii Assistant</h2>
            <p><span class="online-dot"></span> Elevating your tech experience • Pro Support</p>
        </div>
        <div class="header-actions">

            <!-- Theme Picker -->
            <div class="theme-picker" id="themePicker">
                <button class="hbtn keep" onclick="toggleThemePicker()">🎨 Theme</button>
                <div class="theme-menu" id="themeMenu">
                    <div class="theme-opt active" data-theme="dark" onclick="setTheme('dark')">
                        <span class="theme-dot" style="background:#58a6ff"></span> Dark
                    </div>
                    <div class="theme-opt" data-theme="light" onclick="setTheme('light')">
                        <span class="theme-dot" style="background:#0969da"></span> Light
                    </div>
                    <div class="theme-opt" data-theme="purple" onclick="setTheme('purple')">
                        <span class="theme-dot" style="background:#c084fc"></span> Purple
                    </div>
                    <div class="theme-opt" data-theme="ocean" onclick="setTheme('ocean')">
                        <span class="theme-dot" style="background:#38bdf8"></span> Ocean
                    </div>
                </div>
            </div>

            <a href="/dashboard" class="hbtn" target="_blank">📊 Dashboard</a>
            <button class="hbtn" onclick="showRatingModal()">⭐ Rate</button>
            <button class="hbtn keep" onclick="clearChat()">🔄 New</button>
        </div>
    </div>

    <!-- Session bar -->
    <div class="session-bar">
        <span>Session: <code id="sessionId">initializing…</code></span>
        <span>•</span>
        <span id="msgCount">0 messages</span>
    </div>

    <!-- Intent bar -->
    <div class="intent-bar">
        <span>Intent: <span class="intent-badge" id="intentBadge">—</span></span>
        <div class="conf-wrap">
            <span id="confLabel" style="font-size:0.7rem;color:var(--text3)"></span>
            <div class="conf-bar"><div class="conf-fill" id="confFill" style="width:0%"></div></div>
        </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

    <!-- Typing indicator -->
    <div class="typing-row" id="typing" style="padding:0 18px 8px">
        <div class="av bot">🤖</div>
        <div class="typing-dots">
            <div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>
        </div>
    </div>

    <!-- Quick replies -->
    <div class="quick-replies" id="qr">
        <button class="qbtn" onclick="sendQuick('Where is my order?')">📦 Track Order</button>
        <button class="qbtn" onclick="sendQuick('I want to return my order')">↩️ Return</button>
        <button class="qbtn" onclick="sendQuick('Payment failed')">💳 Payment</button>
        <button class="qbtn" onclick="sendQuick('Technical issue')">🔧 Tech Support</button>
        <button class="qbtn" onclick="sendQuick('What are your shipping options?')">🚚 Shipping</button>
        <button class="qbtn" onclick="sendQuick('Any current promotions?')">🏷️ Deals</button>
        <button class="qbtn" onclick="sendQuick('Warranty information')">🛡️ Warranty</button>
        <button class="qbtn" onclick="sendQuick('Cancel my subscription')">❌ Cancel</button>
    </div>

    <!-- Input -->
    <div class="input-area">
        <div class="input-row">
            <textarea class="msg-input" id="input"
                placeholder="Type your message… (Enter to send)"
                rows="1"
                onkeydown="onKey(event)"
                oninput="resize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
        </div>
    </div>
</div>

<!-- Rating Modal -->
<div class="modal-overlay" id="ratingModal">
    <div class="modal">
        <h3>Rate Your Experience</h3>
        <p>How satisfied were you with the support?</p>
        <div class="stars">
            <span class="star" onclick="selectStar(1)" id="s1">⭐</span>
            <span class="star" onclick="selectStar(2)" id="s2">⭐</span>
            <span class="star" onclick="selectStar(3)" id="s3">⭐</span>
            <span class="star" onclick="selectStar(4)" id="s4">⭐</span>
            <span class="star" onclick="selectStar(5)" id="s5">⭐</span>
        </div>
        <div class="rating-txt" id="ratingTxt"></div>
        <textarea class="modal-textarea" id="feedbackTxt" placeholder="Optional — tell us more…"></textarea>
        <div class="modal-acts">
            <button class="mbtn mbtn-ghost" onclick="closeModal()">Skip</button>
            <button class="mbtn mbtn-primary" onclick="submitRating()">Submit</button>
        </div>
    </div>
</div>

<script>
/* ── STATE ─────────────────────────────────────────── */
let sessionId = null;
let msgCount  = 0;
let selRating = 0;
let lastIntent = null;
const API = '';

const ratingLabels = {
    1:'😞 Very Dissatisfied', 2:'😕 Dissatisfied',
    3:'😐 Neutral', 4:'😊 Satisfied', 5:'🤩 Very Satisfied'
};

/* ── THEME ─────────────────────────────────────────── */
function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('chatTheme', t);
    document.querySelectorAll('.theme-opt').forEach(el => {
        el.classList.toggle('active', el.dataset.theme === t);
    });
    closePicker();
}
function toggleThemePicker() {
    document.getElementById('themePicker').classList.toggle('open');
}
function closePicker() {
    document.getElementById('themePicker').classList.remove('open');
}
document.addEventListener('click', e => {
    if (!document.getElementById('themePicker').contains(e.target)) closePicker();
});
// Restore saved theme
(function () {
    const saved = localStorage.getItem('chatTheme') || 'dark';
    setTheme(saved);
})();

/* ── SESSION ───────────────────────────────────────── */
async function init() {
    const saved = sessionStorage.getItem('sid');
    if (saved) {
        sessionId = saved;
        setSessionDisplay(sessionId);
        await loadHistory();
    } else {
        await createSession();
        addBot("✨ Welcome to **Skyfii Electronics**! I'm your premium support assistant. Whether you're tracking a Skyfii Pro order or exploring our latest gear, I'm here to help. How can I assist you today?", 'greeting', 1.0);
    }
}

async function createSession() {
    try {
        const r = await fetch(`${API}/api/chat/session`, { method:'POST' });
        const d = await r.json();
        sessionId = d.session_id;
        sessionStorage.setItem('sid', sessionId);
        setSessionDisplay(sessionId);
    } catch(e) {
        addSys('⚠️ Could not reach server. Make sure Flask is running on port 5000.');
    }
}

async function loadHistory() {
    try {
        const r = await fetch(`${API}/api/chat/history/${sessionId}`);
        const d = await r.json();
        if (d.messages && d.messages.length > 0) {
            document.getElementById('messages').innerHTML = '';
            d.messages.forEach(m => {
                if (m.message_type === 'user') addUser(m.content);
                else addBot(m.content, m.intent, m.confidence);
            });
            msgCount = d.messages.filter(m => m.message_type === 'user').length;
            updateCount();
        } else {
            addBot("👋 Welcome back! How can I help you today?", 'greeting', 1.0);
        }
    } catch(e) {
        addBot("👋 Hello! How can I help you?", 'greeting', 1.0);
    }
}

function setSessionDisplay(sid) {
    document.getElementById('sessionId').textContent = sid.substring(0,8) + '…';
}

/* ── MESSAGING ─────────────────────────────────────── */
async function sendMsg() {
    const el = document.getElementById('input');
    const msg = el.value.trim();
    if (!msg || !sessionId) return;

    el.value = ''; el.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('qr').style.display = 'none';

    addUser(msg);
    showTyping();

    try {
        const r = await fetch(`${API}/api/chat/message`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ session_id: sessionId, message: msg })
        });

        hideTyping();

        if (!r.ok) {
            const err = await r.json().catch(() => ({}));
            addBot(`⚠️ Error: ${err.error || 'Server error ('+r.status+')'}. Please try again.`, 'error', 0);
        } else {
            const d = await r.json();
            addBot(d.response, d.intent, d.confidence / 100, d.sentiment, d.entities, d.response_time_ms);
            updateIntentBar(d.intent, d.confidence);
            lastIntent = d.intent;
            msgCount++;
            updateCount();
        }
    } catch(e) {
        hideTyping();
        addBot('⚠️ Connection error. Make sure the Flask server is running (`python run.py`) and try again.', 'error', 0);
        console.error('Send error:', e);
    }

    document.getElementById('sendBtn').disabled = false;
    document.getElementById('input').focus();
}

function sendQuick(t) { document.getElementById('input').value = t; sendMsg(); }
function onKey(e) { if (e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); } }
function resize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,108)+'px'; }

/* ── RENDER HELPERS ────────────────────────────────── */
function addUser(text) {
    const area = document.getElementById('messages');
    area.insertAdjacentHTML('beforeend', `
        <div class="msg-row user">
            <div class="msg-group">
                <div class="bubble user">${esc(text)}</div>
                <div class="msg-meta" style="justify-content:flex-end">${time()}</div>
            </div>
            <div class="av user">👤</div>
        </div>`);
    scroll();
}

function addBot(text, intent, confidence, sentiment, entities, rt) {
    const sentHtml = buildSentiment(sentiment);
    const entityHtml = buildEntities(entities);
    const rtHtml = rt ? `<span>• ${rt}ms</span>` : '';
    const area = document.getElementById('messages');
    area.insertAdjacentHTML('beforeend', `
        <div class="msg-row bot">
            <div class="av bot">🤖</div>
            <div class="msg-group">
                <div class="bubble bot">${esc(text)}${entityHtml}</div>
                <div class="msg-meta">
                    ${time()} ${rtHtml} ${sentHtml}
                </div>
                <div class="fb-row">
                    <button class="fb-btn" onclick="doFeedback(this,true)">👍 Helpful</button>
                    <button class="fb-btn" onclick="doFeedback(this,false)">👎 Not helpful</button>
                </div>
            </div>
        </div>`);
    scroll();
}

function addSys(text) {
    document.getElementById('messages')
        .insertAdjacentHTML('beforeend', `<div class="sys-msg">${text}</div>`);
}

function buildSentiment(s) {
    if (!s || !s.sentiment) return '';
    const e = {positive:'😊',negative:'😔',neutral:'😐'}[s.sentiment] || '';
    let h = `<span class="sent-tag ${s.sentiment}">${e} ${s.sentiment}</span>`;
    if (s.is_urgent) h += `<span class="sent-tag" style="background:rgba(240,165,0,.15);color:#f0a500">⚡ urgent</span>`;
    return h;
}

function buildEntities(entities) {
    if (!entities || Object.keys(entities).length === 0) return '';
    const pills = Object.entries(entities)
        .map(([k,v]) => `<span class="epill">📌 ${k}: ${esc(String(v))}</span>`)
        .join('');
    return `<div class="entity-pills">${pills}</div>`;
}

/* ── TYPING ────────────────────────────────────────── */
function showTyping() {
    const t = document.getElementById('typing');
    t.classList.add('show'); scroll();
}
function hideTyping() {
    document.getElementById('typing').classList.remove('show');
}

/* ── INTENT BAR ────────────────────────────────────── */
function updateIntentBar(intent, confidence) {
    if (!intent) return;
    document.getElementById('intentBadge').textContent = intent.replace(/_/g,' ');
    document.getElementById('confLabel').textContent = confidence + '%';
    document.getElementById('confFill').style.width = confidence + '%';
}

/* ── FEEDBACK ──────────────────────────────────────── */
async function doFeedback(btn, helpful) {
    const row = btn.closest('.fb-row');
    row.querySelectorAll('.fb-btn').forEach(b => b.classList.remove('good','bad'));
    btn.classList.add(helpful ? 'good' : 'bad');
    try {
        await fetch(`${API}/api/chat/feedback`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ session_id:sessionId, rating:helpful?5:2, helpful, intent_tag:lastIntent })
        });
    } catch(e) {}
}

/* ── RATING MODAL ──────────────────────────────────── */
function showRatingModal() { document.getElementById('ratingModal').classList.add('show'); }
function closeModal() { document.getElementById('ratingModal').classList.remove('show'); }
function selectStar(n) {
    selRating = n;
    for (let i=1;i<=5;i++) document.getElementById('s'+i).classList.toggle('sel', i<=n);
    document.getElementById('ratingTxt').textContent = ratingLabels[n] || '';
}
async function submitRating() {
    if (!selRating) { alert('Please select a rating.'); return; }
    const txt = document.getElementById('feedbackTxt').value;
    try {
        await fetch(`${API}/api/chat/feedback`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ session_id:sessionId, rating:selRating, feedback_text:txt, intent_tag:lastIntent })
        });
        closeModal();
        addBot(`Thank you for your ${selRating}-star rating! 🌟 Your feedback helps us improve.`, 'thanks', 0.99);
    } catch(e) { closeModal(); }
}

/* ── CHAT RESET ────────────────────────────────────── */
function clearChat() {
    sessionStorage.removeItem('sid');
    sessionId = null; msgCount = 0;
    document.getElementById('messages').innerHTML = '';
    document.getElementById('qr').style.display = '';
    document.getElementById('intentBadge').textContent = '—';
    document.getElementById('confLabel').textContent = '';
    document.getElementById('confFill').style.width = '0%';
    updateCount();
    init();
}

/* ── UTILS ─────────────────────────────────────────── */
function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML.replace(/\n/g,'<br>');
}
function time() {
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
function scroll() {
    const m = document.getElementById('messages');
    setTimeout(() => m.scrollTop = m.scrollHeight, 40);
}
function updateCount() {
    document.getElementById('msgCount').textContent = `${msgCount} message${msgCount!==1?'s':''}`;
}

init();
</script>
</body>
</html>
